# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
         dotnet-version: '9.x'

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: dotnet publish
      run: dotnet publish ./Waterloo/Waterloo.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp /p:DeleteExistingFiles=true

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: .net-app
        path: ${{env.DOTNET_ROOT}}/myapp

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
      with:
        version: latest
    - name: Bring up Docker Compose services
      run: docker compose up -d
    - name: Run tests
      run: dotnet test --logger "trx;LogFileName=test-results.trx" --verbosity normal
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'
    - name: Test Report
      uses: dorny/test-reporter@v2
      if:  ${{ !cancelled() }}
      with:
        artifact: test-results
        name: DotNet Tests
        path: '**/*.trx'
        reporter: dotnet-trx

  deploy:
    runs-on: ubuntu-latest
    needs: 
    - build
    - test
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0E61A869C0B441A5A900883A27D1ECFF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C2252434E2124C5D91E35EDDA4A7383B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_58D5DABFDCDC4A0A827CFF3C423A4B17 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'waterloo'
          slot-name: 'Production'
          package: .


