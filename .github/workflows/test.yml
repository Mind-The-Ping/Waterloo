name: .NET Test

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build:
    name: .NET Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
         dotnet-version: '9.x'

    - name: Build with dotnet
      run: dotnet build --configuration Release

    - name: dotnet publish
      run: dotnet publish ./Waterloo/Waterloo.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp /p:DeleteExistingFiles=true

  test:
    name: .NET Test
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'
    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1
      with:
        version: latest
    - name: Bring up Docker Compose services
      run: docker compose up -d
    - name: Run tests
      run: dotnet test --logger "trx;LogFileName=test-results.trx" --verbosity normal
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'
    - name: Test Report
      uses: dorny/test-reporter@v2
      if:  ${{ !cancelled() }}
      with:
        artifact: test-results
        name: DotNet Tests
        path: '**/*.trx'
        reporter: dotnet-trx